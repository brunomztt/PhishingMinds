# essa action impede pull requests na Develop e Main que tenham erro em Build!!! 
# adicionamos isso para não ter erros nessas branchs, 
#agr no final do projeto, aprendemos que não podemos deixar qualquer coisa entrar nessas branchs kkk

name: .NET Build & Test

on:
  pull_request:
    branches:
      - develop
      - master

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal